<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 每日加班暨油資填報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 15px; background-color: #f4f4f7; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #d2232a; font-size: 15pt; text-align: center; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 10.5pt; color: #444; }
        input, select { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 11pt; background-color: #fff; }
        .btn { width: 100%; background-color: #d2232a; color: white; border: none; padding: 13px; border-radius: 6px; font-size: 12pt; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background-color: #ccc; }
        .uid-box { background-color: #f0fff4; border: 2px dashed #28a745; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-size: 10pt; color: #155724; word-break: break-all; text-align: center; }
        .section-title { font-weight: bold; color: #111; margin: 20px 0 10px 0; font-size: 11pt; }
        
        /* 時間組合框排版，讓小時與分鐘並排 */
        .time-combo { display: flex; align-items: center; gap: 8px; }
        .time-combo select { flex: 1; }
        .time-separator { font-weight: bold; font-size: 14pt; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏍️ 苗栗維調 加班/油資報支</h2>
    
    <div class="uid-box">
        <div id="display-uid">身分驗證成功，連線安全</div>
    </div>

    <form id="report-form">
        <div class="form-group">
            <label>1. 選擇報支日期</label>
            <input type="date" id="report-date" required>
        </div>

        <div class="form-group">
            <label>2. 請選擇「今日額外加班時數」</label>
            <select id="ot-hours">
                <option value="1">1 小時 (累計 2H)</option>
                <option value="2">2 小時 (累計 3H)</option>
                <option value="3">3 小時 (累計 4H-達上限)</option>
            </select>
        </div>

        <div style="border-top: 2px dashed #eee; margin: 20px 0;"></div>
        <div class="section-title">🏍️ 機車油資巡邏時間 (未巡邏請保持預設不變)</div>

        <div class="form-group">
            <label>巡邏開始時間</label>
            <div class="time-combo">
                <select id="start-hour">
                    <option value="">-- 小時 --</option>
                    <script>
                        for(let i=0; i<24; i++) {
                            let hr = i < 10 ? '0' + i : i;
                            document.write(`<option value="${hr}">${hr} 點</option>`);
                        }
                    </script>
                </select>
                <div class="time-separator">:</div>
                <select id="start-minute">
                    <option value="">-- 分鐘 --</option>
                    <option value="00">00 分</option>
                    <option value="30">30 分</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>巡邏結束時間</label>
            <div class="time-combo">
                <select id="end-hour">
                    <option value="">-- 小時 --</option>
                    <script>
                        for(let i=0; i<24; i++) {
                            let hr = i < 10 ? '0' + i : i;
                            document.write(`<option value="${hr}">${hr} 點</option>`);
                        }
                    </script>
                </select>
                <div class="time-separator">:</div>
                <select id="end-minute">
                    <option value="">-- 分鐘 --</option>
                    <option value="00">00 分</option>
                    <option value="30">30 分</option>
                </select>
            </div>
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>確認送出報支</button>
    </form>
</div>

<script>
    // ⚠️ 記得換上你的 LINE LIFF ID 與 你的 Google 網址
    const MY_LIFF_ID = '2010178820-ANKUf0Qe'; 
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxYtIsyFSwA_qDnqSekw4i-hqnPQitBbRxzqpnJvNj-Fo6JMf0ifJ0jVJKee-ExdUlk/exec'; 

    let userId = "";

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userId = profile.userId;
                document.getElementById('display-uid').innerHTML = "經辦同仁：<b>" + profile.displayName + "</b>";
                document.getElementById('submit-btn').disabled = false;
                
                const now = new Date();
                const offset = now.getTimezoneOffset();
                const localDate = new Date(now.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
                document.getElementById('report-date').value = localDate;
            }
        } catch (error) {
            document.getElementById('display-uid').innerText = "❌ 讀取失敗，請在 LINE 內打開。";
        }
    }

    document.getElementById('report-form').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').innerText = "寫入試算表中...";

        // 組合開始時間與結束時間 (格式固定為 HH:MM)
        let gasStartStr = "";
        let gasEndStr = "";
        
        const sHr = document.getElementById('start-hour').value;
        const sMin = document.getElementById('start-minute').value;
        const eHr = document.getElementById('end-hour').value;
        const eMin = document.getElementById('end-minute').value;
        
        // 只有在小時跟分鐘都有選的時候，才組合時間字串
        if (sHr && sMin) gasStartStr = sHr + ":" + sMin;
        if (eHr && eMin) gasEndStr = eHr + ":" + eMin;

        const formData = {
            userId: userId,
            date: document.getElementById('report-date').value,
            otHours: document.getElementById('ot-hours').value,
            gasStart: gasStartStr,
            gasEnd: gasEndStr
        };

        fetch(GAS_WEBAPP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert('🎉 報支成功！');
            liff.closeWindow();
        })
        .catch(err => {
            alert('系統錯誤：' + err);
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "確認送出報支";
        });
    });

    initLiff();
</script>
</body>
</html>
