<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouBike 每日加班暨油資填報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; padding: 15px; background-color: #f4f4f7; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        h2 { margin-top: 0; color: #d2232a; font-size: 15pt; text-align: center; letter-spacing: 1px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 10.5pt; color: #444; }
        input, select { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 11pt; -webkit-appearance: none; }
        input[type="time"] { min-height: 40px; }
        .btn { width: 100%; background-color: #d2232a; color: white; border: none; padding: 13px; border-radius: 6px; font-size: 12pt; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:disabled { background-color: #ccc; }
        .info { font-size: 9.5pt; color: #222; text-align: center; background: #fff9e6; padding: 8px; border-radius: 6px; border: 1px solid #ffe8a1; }
        .section-title { font-weight: bold; color: #111; margin: 20px 0 10px 0; font-size: 11pt; display: flex; align-items: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>🏍️ 苗栗維調 加班/油資報支</h2>
    <div id="user-info" class="info">正在讀取 LINE 身分，請稍候...</div>
    <br>
    <form id="report-form">
        <div class="form-group">
            <label>1. 選擇報支日期</label>
            <input type="date" id="report-date" required>
        </div>

        <div class="form-group">
            <label>2. 變更今日加班時數 (若非預設狀態才需修改)</label>
            <select id="ot-hours">
                <option value="PRESET">維持班表預設時數 (1小時/早加2H)</option>
                <option value="0">0 小時 (今天沒加班)</option>
                <option value="1">1 小時</option>
                <option value="2">2 小時</option>
                <option value="3">3 小時</option>
                <option value="4">4 小時 (每日上限)</option>
            </select>
        </div>

        <div style="border-top: 2px dashed #eee; margin: 20px 0;"></div>
        <div class="section-title">🏍️ 機車油資補助 (若無巡邏請留空)</div>

        <div class="form-group">
            <label>巡邏開始時間</label>
            <input type="time" id="gas-start">
        </div>

        <div class="form-group">
            <label>巡邏結束時間</label>
            <input type="time" id="gas-end">
        </div>

        <div class="form-group">
            <label>申請油資補助金額 (元)</label>
            <input type="number" id="gas-amount" placeholder="例如: 150" min="0">
        </div>

        <button type="submit" class="btn" id="submit-btn" disabled>確認送出報支</button>
    </form>
</div>

<script>
    // ⚠️ 請在下方填入你的 LINE LIFF ID 與 Google WebApp 網址
    const MY_LIFF_ID = '2010178820-ANKUf0Qe'; 
    const GAS_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxYtIsyFSwA_qDnqSekw4i-hqnPQitBbRxzqpnJvNj-Fo6JMf0ifJ0jVJKee-ExdUlk/exec'; 

    let userId = "";

    async function initLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const profile = await liff.getProfile();
                userId = profile.userId;
                document.getElementById('user-info').innerHTML = "經辦同仁：<b>" + profile.displayName + "</b> (已安全連線)";
                document.getElementById('submit-btn').disabled = false;
                
                // 自動將日期預設為今天
                const now = new Date();
                const offset = now.getTimezoneOffset();
                const localDate = new Date(now.getTime() - (offset * 60 * 1000)).toISOString().split('T')[0];
                document.getElementById('report-date').value = localDate;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('user-info').innerText = "連線失敗，請確保在 LINE 軟體內打開此連結";
        }
    }

    document.getElementById('report-form').addEventListener('submit', function(e) {
        e.preventDefault();
        document.getElementById('submit-btn').disabled = true;
        document.getElementById('submit-btn').innerText = "連線後台寫入中...";

        const formData = {
            userId: userId,
            date: document.getElementById('report-date').value,
            otHours: document.getElementById('ot-hours').value,
            gasStart: document.getElementById('gas-start').value,
            gasEnd: document.getElementById('gas-end').value,
            gasAmount: document.getElementById('gas-amount').value
        };

        fetch(GAS_WEBAPP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(formData)
        })
        .then(() => {
            alert('🎉 報支成功！資料已寫入加班單！');
            liff.closeWindow();
        })
        .catch(err => {
            alert('系統錯誤，請稍後再試：' + err);
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('submit-btn').innerText = "確認送出報支";
        });
    });

    initLiff();
</script>
</body>
</html>
